name: Daily AI/Data Briefing (Mailgun)

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate and Send Newsletter
        run: python -c "
from app.services.fetcher import ArticleFetcher
from app.services.categorizer import ArticleCategorizer
from app.services.emailer import EmailSender
import os

# Fetch articles using Tavily
fetcher = ArticleFetcher()
articles = fetcher.fetch_articles()
print(f'Fetched {len(articles)} articles')

# Categorize
categorizer = ArticleCategorizer()
categorized = categorizer.categorize_articles(articles)

# Generate HTML
html = '''<html><body style=\"font-family: Arial; max-width: 800px; margin: 0 auto;\">
<h1>📬 Daily AI/Data Briefing</h1>
<p style=\"color: #666;\">Your daily digest of the latest in AI, Machine Learning, and Data Science</p>
'''

categories = {}
for article in categorized:
    cat = article.category or 'General'
    if cat not in categories:
        categories[cat] = []
    categories[cat].append(article)

for category, articles_in_cat in categories.items():
    html += f'<h2>{category}</h2>'
    for article in articles_in_cat:
        html += f'''<div style=\"margin: 20px 0; padding: 15px; border-left: 4px solid #007bff;\">
<h3 style=\"margin: 0 0 10px 0;\">{article.title}</h3>
<p style=\"color: #666; margin: 10px 0;\">{article.summary or \"\"}</p>
<a href=\"{article.link}\" style=\"color: #007bff; text-decoration: none;\">Read Full Article →</a>
</div>'''

html += '</body></html>'

# Send email
emailer = EmailSender()
emailer.send_newsletter(html)
print('Newsletter sent successfully!')
        "
        env:
          TAVILY_API_KEY: \${{ secrets.TAVILY_API_KEY }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}